<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixie — Your Personal AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F0A1E; --surface: #1A1030; --surface2: #241848;
    --purple: #7C3AED; --purple-light: #EDE9FE; --purple-mid: #6D28D9;
    --text: #EDE9FE; --muted: #9CA3AF; --border: #1F1440;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-bottom: 0.5px solid var(--border); }
  .header-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--purple); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-title { font-size: 20px; font-weight: 600; }
  .header-sub { font-size: 13px; color: var(--purple-mid); }
  .header-status { margin-left: auto; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #10B981; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 280px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; gap: 20px; overflow-y: auto; }
  .avatar-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .avatar-circle { width: 100px; height: 100px; border-radius: 50%; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; transition: transform 0.3s; }
  .avatar-circle.speaking { animation: speakBounce 0.3s ease-in-out infinite alternate; }
  .avatar-circle.thinking { animation: spin 3s linear infinite; }
  .avatar-circle.listening { box-shadow: 0 0 0 0 rgba(124,58,237,0.7); animation: ringPulse 1s ease-out infinite; }
  @keyframes speakBounce { from{transform:scale(1)} to{transform:scale(1.05)} }
  @keyframes spin { from{filter:hue-rotate(0deg)} to{filter:hue-rotate(360deg)} }
  @keyframes ringPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,0.7)} 70%{box-shadow:0 0 0 15px rgba(124,58,237,0)} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0)} }
  .avatar-name { font-size: 16px; font-weight: 600; }
  .avatar-state { font-size: 12px; color: var(--muted); }
  .wave-bars { display: flex; gap: 3px; align-items: center; height: 20px; margin-top: 4px; }
  .wave-bar { width: 3px; border-radius: 2px; background: var(--purple); }
  .wave-bar:nth-child(1){animation:wave 0.6s 0s ease-in-out infinite}
  .wave-bar:nth-child(2){animation:wave 0.6s .1s ease-in-out infinite}
  .wave-bar:nth-child(3){animation:wave 0.6s .2s ease-in-out infinite}
  .wave-bar:nth-child(4){animation:wave 0.6s .3s ease-in-out infinite}
  .wave-bar:nth-child(5){animation:wave 0.6s .15s ease-in-out infinite}
  @keyframes wave { 0%,100%{height:4px} 50%{height:18px} }

  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .memory-list { display: flex; flex-direction: column; gap: 6px; }
  .memory-item { background: var(--surface); border-radius: 8px; padding: 8px 10px; font-size: 12px; color: var(--purple-light); border: 0.5px solid var(--border); }
  .memory-type { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.pixie { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }
  .msg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--purple); margin-bottom: 6px; flex-shrink: 0; }
  .bubble { max-width: 65%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
  .bubble.pixie { background: var(--surface2); border-bottom-left-radius: 4px; color: var(--purple-light); }
  .bubble.user { background: var(--purple); border-bottom-right-radius: 4px; color: white; }
  .bubble-time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .typing { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--muted); font-size: 13px; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: typingBounce 0.6s ease-in-out infinite; }
  .typing-dot:nth-child(2){animation-delay:.1s}
  .typing-dot:nth-child(3){animation-delay:.2s}
  @keyframes typingBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* Input */
  .input-area { padding: 16px 24px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
  .input-box { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 12px 16px; color: var(--text); font-size: 15px; resize: none; font-family: inherit; max-height: 100px; outline: none; }
  .input-box:focus { border-color: var(--purple); }
  .input-box::placeholder { color: var(--muted); }
  .send-btn { width: 44px; height: 44px; border-radius: 22px; background: var(--purple); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .1s, background .2s; flex-shrink: 0; }
  .send-btn:hover { background: var(--purple-mid); transform: scale(1.05); }
  .send-btn:disabled { background: #3B1F6E; cursor: not-allowed; transform: none; }
  .img-btn { width: 44px; height: 44px; border-radius: 22px; background: var(--surface); border: 0.5px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; flex-shrink: 0; }
  .img-btn:hover { background: var(--surface2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <div>
    <div class="header-title">Pixie</div>
    <div class="header-sub">your personal AI</div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span id="statusText">Online</span>
  </div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="avatar-area">
      <div class="avatar-circle" id="avatarCircle">😊</div>
      <div class="avatar-name">Pixie</div>
      <div class="avatar-state" id="avatarState">Ready for you ✨</div>
      <div class="wave-bars" id="waveBars" style="display:none">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>

    <div>
      <div class="section-title" style="margin-bottom:10px">Pixie's memory</div>
      <div class="memory-list" id="memoryList">
        <div class="memory-item" style="color:var(--muted)">Loading memories...</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <label class="img-btn" title="Send image">
        🖼
        <input type="file" accept="image/*" id="imgInput" style="display:none" onchange="sendImage(this)">
      </label>
      <textarea class="input-box" id="inputBox" placeholder="Talk to Pixie..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onfocus="setAvatarState('listening')" onblur="setAvatarState('idle')"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
    </div>
  </div>
</div>

<audio id="audioPlayer" style="display:none"></audio>

<script>
const BACKEND = 'https://YOUR-RAILWAY-URL.up.railway.app'; // ← update after deploy
const socket = io(BACKEND, { transports: ['websocket'] });
let isLoading = false;

// ─── Avatar State ──────────────────────────────────────────────────────────────
const avatarEmojis = { idle:'😊', listening:'👂', thinking:'🤔', speaking:'💬', happy:'😄', sad:'🥺' };
const avatarLabels = { idle:'Ready for you ✨', listening:'Listening...', thinking:'Thinking...', speaking:'Speaking...', happy:'Yay!', sad:'Here for you' };

function setAvatarState(state) {
  const circle = document.getElementById('avatarCircle');
  const label = document.getElementById('avatarState');
  const waves = document.getElementById('waveBars');
  circle.className = 'avatar-circle ' + (state !== 'idle' ? state : '');
  circle.textContent = avatarEmojis[state] || '😊';
  label.textContent = avatarLabels[state] || '';
  waves.style.display = state === 'speaking' ? 'flex' : 'none';
}

// ─── Messages ──────────────────────────────────────────────────────────────────
function addMessage(role, content) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'assistant' ? 'pixie' : 'user');
  const time = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  if (role === 'assistant') {
    row.innerHTML = `<div class="msg-dot"></div><div><div class="bubble pixie">${content}</div><div class="bubble-time">${time}</div></div>`;
  } else {
    row.innerHTML = `<div><div class="bubble user">${content}</div><div class="bubble-time" style="text-align:right">${time}</div></div>`;
  }
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typingDiv'; div.className = 'typing';
  div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span style="margin-left:4px">Pixie is thinking...</span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function hideTyping() { document.getElementById('typingDiv')?.remove(); }

// ─── Send Message ──────────────────────────────────────────────────────────────
async function sendMessage(text = null, imageBase64 = null, imageType = null) {
  const box = document.getElementById('inputBox');
  const msg = text || box.value.trim();
  if (!msg && !imageBase64) return;
  if (isLoading) return;

  box.value = ''; box.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', msg || 'What do you see?');
  showTyping();
  setAvatarState('thinking');

  try {
    const body = { message: msg || 'What do you see?' };
    if (imageBase64) { body.imageBase64 = imageBase64; body.imageType = imageType; }

    const res = await fetch(`${BACKEND}/api/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    hideTyping();
    addMessage('assistant', data.reply);

    if (data.audio) {
      setAvatarState('speaking');
      const audio = document.getElementById('audioPlayer');
      audio.src = 'data:audio/mp3;base64,' + data.audio;
      audio.onended = () => setAvatarState('idle');
      audio.play();
    } else {
      setAvatarState(data.mood === 'happy' ? 'happy' : data.mood === 'sad' ? 'sad' : 'idle');
      setTimeout(() => setAvatarState('idle'), 2000);
    }
    loadMemories();
  } catch (e) {
    hideTyping();
    addMessage('assistant', 'Arre yaar, something went wrong. Try again!');
    setAvatarState('idle');
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── Send Image ────────────────────────────────────────────────────────────────
async function sendImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    await sendMessage('What do you see in this image?', base64, file.type);
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ─── Load History ──────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${BACKEND}/api/history`);
    const msgs = await res.json();
    msgs.slice(-30).forEach(m => addMessage(m.role, m.content));
  } catch {
    addMessage('assistant', 'Heyy! Main hoon Pixie — tumhari personal AI. Kaise ho aaj? 😊');
  }
}

// ─── Load Memories ─────────────────────────────────────────────────────────────
async function loadMemories() {
  try {
    const res = await fetch(`${BACKEND}/api/memories`);
    const mems = await res.json();
    const list = document.getElementById('memoryList');
    if (!mems.length) { list.innerHTML = '<div class="memory-item" style="color:var(--muted)">Talk to Pixie — she\'ll remember!</div>'; return; }
    list.innerHTML = mems.slice(0, 8).map(m =>
      `<div class="memory-item"><div class="memory-type">${m.type}</div>${m.content}</div>`
    ).join('');
  } catch {}
}

// ─── Socket.io ─────────────────────────────────────────────────────────────────
socket.on('morning_briefing', ({ content, audio }) => {
  addMessage('assistant', content);
  if (audio) {
    const a = document.getElementById('audioPlayer');
    a.src = 'data:audio/mp3;base64,' + audio;
    a.play();
  }
});

// ─── Init ──────────────────────────────────────────────────────────────────────
loadHistory();
loadMemories();
</script>
</body>
</html>
